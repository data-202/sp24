project:
  type: website
  output-dir: docs

website:
  page-navigation: true
  title: "DATA 202: Statistically Measuring and Modeling Social Justice"
  description: "Homepage for DATA 202: Statistically Measuring and Modeling Social Justice"
  site-url: "https://github.com/data-202/"
  
  repo-url: https://data-202.github.io/sp24
  
  open-graph: true
  
  twitter-card:
    creator: "@professornaite"
  
  page-footer:
    right: "This page was built by Nathan Alexander, PhD in [Quarto](https://quarto.org/)"
    left: "&copy; Copyright 2024, Nathan Alexander"
    background: "#D9E3E4"
    
  sidebar:
    background: "#D9E3E4"
    logo: "img/dubois-loc.jpg"
    pinned: true
    align: center
    tools: 
      - icon: github
        href: https://data-202.github.io/sp24
        text: "GitHub organization"
      - icon: code-square
        href: https://canvas.howard.edu/courses/40683
        text: "Canvas site"
  
    style: "docked"
    search: true
    collapse-level: 1
    contents:  
    - section: "Course information"
      contents:
        - href: index.qmd
          text: Course landing page

format:
  html:
    theme: 
      light: [cosmo, theme.scss]
      dark: [cosmo, theme-dark.scss]
    mainfont: "Atkinson Hyperlegible"
    callout-appearance: simple
    colorlinnks: true
    code-copy: true
    code-overflow: wrap
    toc: true
    
freeze: auto
    
editor: visual